name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.9", "3.10", "3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Run unittest suite
        run: python -m unittest discover -s tests -v
      - name: Collect marshal digests
        run: python scripts/collect_marshal_digests.py > marshal-digests-${{ matrix.os }}-${{ matrix.python-version }}.json
      - name: Upload digest artifact
        uses: actions/upload-artifact@v4
        with:
          name: marshal-digests-${{ matrix.os }}-${{ matrix.python-version }}
          path: marshal-digests-${{ matrix.os }}-${{ matrix.python-version }}.json
